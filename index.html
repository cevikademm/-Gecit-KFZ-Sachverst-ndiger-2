  <!-- SCROLL GUARDIAN - body/html scroll'u kilitlenirse otomatik geri alir -->
  <script>
    (function scrollGuardian() {
      var html = document.documentElement;
      var body = document.body;
      if (!body) {
        document.addEventListener('DOMContentLoaded', scrollGuardian);
        return;
      }
      function fix(el, label) {
        var changed = false;
        var s = el.style;
        if (s.overflow === 'hidden' || s.overflowY === 'hidden') {
          s.overflow = '';
          s.overflowY = '';
          changed = true;
        }
        if (s.touchAction === 'none') {
          s.touchAction = '';
          changed = true;
        }
        if (s.position === 'fixed' && el === body) {
          s.position = '';
          changed = true;
        }
        if (changed) console.warn('[ScrollGuardian] ' + label + ' scroll kilidi geri alindi');
      }
      function watch(el, label) {
        new MutationObserver(function() { fix(el, label); })
          .observe(el, { attributes: true, attributeFilter: ['style'] });
      }
      watch(html, 'html');
      watch(body, 'body');
      fix(html, 'html'); fix(body, 'body');
      document.addEventListener('visibilitychange', function() {
        if (!document.hidden) { fix(html, 'html'); fix(body, 'body'); }
      });
    })();
  </script>
